name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check all scripts
        run: |
          python -m py_compile scripts/check_nuget.py
          python -m py_compile scripts/analyze_release.py
          python -m py_compile scripts/analyze_release_aspose.py
          python -m py_compile scripts/merge_dependabot.py
          python -m py_compile scripts/merge_dependabot_aspose.py
          python -m py_compile scripts/upgrade_product.py
          echo "All scripts passed syntax check."

      - name: Verify scripts start up (--help)
        run: |
          python scripts/analyze_release.py --help
          python scripts/analyze_release_aspose.py --help
          python scripts/merge_dependabot.py --help
          python scripts/merge_dependabot_aspose.py --help
          python scripts/upgrade_product.py --help

      - name: Run NuGet version check (read-only, no auth)
        run: python scripts/check_nuget.py
