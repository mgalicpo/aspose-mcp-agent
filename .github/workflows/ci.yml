name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check scripts/ tests/

      - name: Type check (mypy)
        run: mypy scripts/ --config-file pyproject.toml

      - name: Security audit (pip-audit)
        run: pip-audit --desc

      - name: Syntax check all scripts
        run: |
          for f in scripts/*.py; do
            python -m py_compile "$f"
            echo "  OK: $f"
          done

      - name: Verify scripts start up (--help)
        run: |
          python scripts/analyze_release.py --help
          python scripts/analyze_release_aspose.py --help
          python scripts/merge_dependabot.py --help
          python scripts/merge_dependabot_aspose.py --help
          python scripts/upgrade_product.py --help
          python scripts/new_product.py --help
          python scripts/analyze_new_product.py --help
          python scripts/analyze_new_product_aspose.py --help

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=scripts --cov-report=term-missing --cov-config=pyproject.toml

      - name: Run NuGet version check (read-only, no auth)
        run: python scripts/check_nuget.py
